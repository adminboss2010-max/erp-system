<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل شراء</title>
<link rel="stylesheet" href="design-system.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="27" y="52" width="10" height="24" rx="2.5" fill="#b8932f"/>
        <rect x="41" y="42" width="10" height="34" rx="2.5" fill="#b8932f"/>
        <rect x="55" y="30" width="10" height="46" rx="2.5" fill="#b8932f"/>
        <rect x="69" y="18" width="10" height="58" rx="2.5" fill="#d9bc8c"/>
      </svg>
    </div>
    <div class="brand-name">prova<small>UNIFIED ERP SYSTEM</small></div>
  </div>
</header>
<nav class="app-nav">
  <a href="customers.html">العملاء</a>
  <a href="agents.html">المناديب</a>
  <a href="items.html">الأصناف</a>
  <a href="sales.html">تسجيل بيع</a>
  <a href="statement.html">كشف حساب عميل</a>
  <a href="suppliers.html">الموردين</a>
  <a href="purchases.html" class="active">تسجيل شراء</a>
</nav>
<div class="page-container">

<h2 class="page-title">📥 تسجيل عملية شراء</h2>

<div class="card">
  <h3>بيانات فاتورة الشراء</h3>
  <select id="purSupplier"><option value="">— اختر المورد —</option></select>
  <select id="purItem"><option value="">— اختر الصنف —</option></select>
  <input id="purQty" type="number" placeholder="الكمية" min="1">
  <input id="purCost" type="number" step="0.001" placeholder="سعر التكلفة للوحدة">
  <input id="purTax" type="number" step="0.1" placeholder="نسبة الضريبة % (اختياري)" value="0">
  <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px">
    <input id="purCredit" type="checkbox" style="width:auto"> شراء بالآجل (على الحساب)
  </label>
  <br>
  <button class="btn-gold" onclick="submitPurchase()">تسجيل الشراء</button>
  <div id="purMsg"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  let currentCompanyId = null;

  async function init() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) { alert('لازم تسجل دخول الأول من test-auth.html'); return; }
    const companyInfo = await AuthClientV2.getCurrentCompany();
    if (!companyInfo.ok) { alert('خطأ: ' + companyInfo.error); return; }
    currentCompanyId = companyInfo.company_id;

    const [suppliers, items] = await Promise.all([
      SuppliersClient.list(currentCompanyId),
      ItemsClient.list(currentCompanyId)
    ]);

    if (suppliers.ok) {
      document.getElementById('purSupplier').innerHTML += suppliers.suppliers.map(s =>
        `<option value="${s.id}">${s.name}</option>`).join('');
    }
    if (items.ok) {
      document.getElementById('purItem').innerHTML += items.items.map(i =>
        `<option value="${i.id}">${i.name}</option>`).join('');
    }
  }

  async function submitPurchase() {
    const itemId = document.getElementById('purItem').value;
    const qty = parseFloat(document.getElementById('purQty').value);
    const unitCost = parseFloat(document.getElementById('purCost').value);
    const taxRate = parseFloat(document.getElementById('purTax').value) || 0;

    if (!itemId || !qty || qty <= 0 || !unitCost) {
      document.getElementById('purMsg').innerHTML = '<span class="msg-error">اختر صنف واكتب كمية وسعر تكلفة صحيحين</span>';
      return;
    }

    const payload = {
      company_id: currentCompanyId,
      supplier_id: document.getElementById('purSupplier').value || null,
      items: [{ item_id: itemId, qty: qty, unit_cost: unitCost, tax_rate: taxRate }],
      is_credit: document.getElementById('purCredit').checked
    };

    const result = await PurchasesClient.postPurchase(payload);
    if (!result.ok) {
      document.getElementById('purMsg').innerHTML = `<span class="msg-error">${result.error}</span>`;
      return;
    }
    document.getElementById('purMsg').innerHTML =
      `<span class="msg-success">✅ تم تسجيل الشراء — رقم الفاتورة: ${result.transaction?.doc_no}، الإجمالي شامل الضريبة: ${result.transaction?.grand_total?.toFixed(3)}</span>`;
    document.getElementById('purQty').value = '';
    document.getElementById('purCost').value = '';
  }

  init();
</script>
</body>
</html>
